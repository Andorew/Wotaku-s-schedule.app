<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ヲタクの本気管理アプリ - 検索成功版</title>
</head>
<body>
    <h1>書籍検索テスト</h1>
    <input type="text" id="keyword" placeholder="鬼滅の刃、など">
    <button id="search-btn">検索する</button>

    <div id="status" style="margin: 10px 0; padding: 10px; background: #eee; border-left: 5px solid #333;">
        ここに通信状態が表示されます。
    </div>

    <div id="results"></div>

    <script>
        // 楽天からデータが返ってきたときに自動で実行される関数（マニュアルのルール）
        window.rakutenCallback = (data) => {
            const statusDiv = document.getElementById('status');
            const resultsDiv = document.getElementById('results');

            // 楽天側でエラーが起きた場合
            if (data.error) {
                statusDiv.innerHTML = `<span style="color:red; font-weight:bold;">❌ 楽天エラー: ${data.error_description || data.error}</span>`;
                return;
            }

            if (!data.Items || data.Items.length === 0) {
                statusDiv.innerText = '通信成功：本が見つかりませんでした。';
                return;
            }

            statusDiv.innerText = `成功！ ${data.Items.length}件の本が見つかりました！`;

            // 画面に本の情報を並べる
            data.Items.forEach(item => {
                const book = item.Item;
                const bookEl = document.createElement('div');
                bookEl.style.margin = '20px 0';
                bookEl.innerHTML = `
                    <h3>${book.title}</h3>
                    <p>著者: ${book.author} / 出版社: ${book.publisher}</p>
                    <p>発売日: ${book.salesDate}</p>
                    <img src="${book.mediumImageUrl}" alt="表紙">
                    <hr>
                `;
                resultsDiv.appendChild(bookEl);
            });

            // 使い終わった通信用のタグをきれいに消す
            const oldScript = document.getElementById('rakuten-jsonp');
            if (oldScript) oldScript.remove();
        };

        // ボタンを押した時の処理
        document.getElementById('search-btn').addEventListener('click', () => {
            const keyword = document.getElementById('keyword').value;
            const statusDiv = document.getElementById('status');
            const resultsDiv = document.getElementById('results');
            
            if (!keyword) return alert('キーワードを入力してください');

            statusDiv.innerText = '楽天APIにデータをリクエスト中...';
            resultsDiv.innerHTML = '';

            // あなたの正しいアプリケーションID（ハイフン付きのままでOK）
            const appId = '83d10cad-7ffa-46a4-9ca5-f0a127bf5882'; 
            
            // 【マニュアル指定の最重要ポイント】
            // ① applicationId= に戻します（ハイフン付きでもこれで合っています）
            // ② 末尾に「&callback=rakutenCallback」を合体させます（CORS回避の魔法です）
            const url = `https://app.rakuten.co.jp/services/api/BooksBook/Search/20170404?format=json&keyword=${encodeURIComponent(keyword)}&applicationId=${appId}&callback=rakutenCallback`;

            // 古い通信用タグが残っていれば先に消す
            const oldScript = document.getElementById('rakuten-jsonp');
            if (oldScript) oldScript.remove();

            // <script>タグを一時的に作って、楽天に安全にデータを貰いにいく（CORSをすり抜ける唯一の技）
            const script = document.createElement('script');
            script.id = 'rakuten-jsonp';
            script.src = url;
            document.body.appendChild(script);
        });
    </script>
</body>
</html>
