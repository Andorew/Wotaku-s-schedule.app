      <!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ヲタクの本気管理アプリ - 楽天リベンジ版</title>
</head>
<body>
    <h1>書籍検索テスト (楽天ブックス最強版)</h1>
    <input type="text" id="keyword" placeholder="鬼滅の刃、ONE PIECEなど">
    <button id="search-btn">検索する</button>

    <div id="status" style="margin: 10px 0; padding: 10px; background: #eee; border-left: 5px solid #bf0000;">
        ここに通信状態が表示されます。
    </div>

    <div id="results"></div>

    <script>
        document.getElementById('search-btn').addEventListener('click', () => {
            const keyword = document.getElementById('keyword').value;
            const statusDiv = document.getElementById('status');
            const resultsDiv = document.getElementById('results');
            
            if (!keyword) return alert('キーワードを入力してください');

            statusDiv.innerText = '楽天ブックスの日本のコミックデータのみを厳選して取得中...';
            resultsDiv.innerHTML = '';

            // ==========================================
            // ⚠️ あなたの楽天の情報をここに正確に貼り付けます
            // ==========================================
            const appId = 'cc9bd69b-720f-46a4-8820-b3e27c9b26c7'; 
            const accessKey = 'MvWraoxmEPfz7byKhIa8lvvYgzkwwRLJq'; 

            // 💡 楽天ブックスAPI（BooksBook/Search）の最大の強み：
            // 最初から「日本の本」しかなく、さらに「&booksGenreId=001001」を指定することで、
            // 雑誌や小説、歴史本、洋書を【完全にゼロ】にして「少年・青年・少女コミックス単行本」だけに100%固定できます！
            const rakutenUrl = `https://app.rakuten.co.jp/services/api/BooksBook/Search/20170404?format=json&title=${encodeURIComponent(keyword)}&booksGenreId=001001&hits=30`;

            // 💡 前回エラーになったCORSを、超安定しているAllOriginsプロキシ経由で完全にすり抜けます
            const url = `https://api.allorigins.win/get?url=${encodeURIComponent(rakutenUrl)}`;

            fetch(url)
            .then(response => {
                if (response.ok) return response.json();
                throw new Error('ネットワークエラーが発生しました');
            })
            .then(wrapper => {
                // 中継サーバーから届いた本物のデータをパースします
                const data = JSON.parse(wrapper.contents);

                if (data.error) {
                    throw new Error(`楽天エラー: ${data.error_description || data.error}`);
                }

                if (!data.Items || data.Items.length === 0) {
                    statusDiv.innerText = '通信成功：日本のコミックスが見つかりませんでした。';
                    return;
                }

                statusDiv.innerText = `大成功！ 楽天から純粋なコミックス単行本を ${data.Items.length} 件取得しました！`;

                data.Items.forEach(item => {
                    const book = item.Item;

                    // 楽天の画像URLを、一番高画質なものに自動変換します
                    const bookImage = book.largeImageUrl.replace('?_ex=200x200', '?_ex=300x300');

                    const bookEl = document.createElement('div');
                    bookEl.style.margin = '20px 0';
                    bookEl.innerHTML = `
                        <h3>${book.title}</h3>
                        <p><b>著者:</b> ${book.author} / <b>出版社:</b> ${book.publisher}</p>
                        <p><b>発売日:</b> ${book.salesDate} / <b>価格:</b> ${book.itemPrice}円</p>
                        <img src="${bookImage}" alt="表紙" style="box-shadow: 2px 2px 8px rgba(0,0,0,0.3); max-width: 150px; border-radius: 4px;">
                        <hr style="border: 0; border-top: 1px solid #ccc; margin-top: 15px;">
                    `;
                    resultsDiv.appendChild(bookEl);
                });
            })
            .catch(error => {
                console.error('エラー詳細:', error);
                statusDiv.innerHTML = `<span style="color:red; font-weight:bold;">❌ エラー: ${error.message}</span>`;
            });
        });
    </script>
</body>
</html>
    </script>
  </body>
</html>
