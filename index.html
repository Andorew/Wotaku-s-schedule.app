<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>新仕様対応版 - ヲタクの本気管理アプリ</title>
</head>
<body>
    <h1>書籍検索テスト</h1>
    <input type="text" id="keyword" placeholder="鬼滅の刃、など">
    <button id="search-btn">検索する</button>

    <div id="status" style="margin: 10px 0; padding: 10px; background: #eee; border-left: 5px solid #333;">
        ここに通信状態が表示されます。
    </div>

    <div id="results"></div>

    <script>
        document.getElementById('search-btn').addEventListener('click', () => {
            const keyword = document.getElementById('keyword').value;
            const statusDiv = document.getElementById('status');
            const resultsDiv = document.getElementById('results');
            
            if (!keyword) return alert('キーワードを入力してください');

            statusDiv.innerText = 'リクエスト送信中...';
            resultsDiv.innerHTML = '';

            // あなたの「アプリケーションID（デベロッパーID）」
            const appId = '83d10cad-7ffa-46a4-9ca5-f0a127bf5882'; 
            
            // 【新仕様の修正】
            // URLからはID（applicationIdやdeveloperId）を完全に削除します。
            const url = `https://app.rakuten.co.jp/services/api/BooksBook/Search/20170404?format=json&keyword=${encodeURIComponent(keyword)}`;

            // 【これが原因だった「辞書のキー」です】
            // 楽天の新しいシステムは、この「X-Rakuten-Developer-Id」というキー名で
            // IDを通信のヘッダー（裏側）に含めて送るルールになっています。
            fetch(url, {
                method: 'GET',
                headers: {
                    'X-Rakuten-Developer-Id': appId
                }
            })
            .then(response => {
                if (!response.ok) {
                    return response.json().then(errData => {
                        throw new Error(`楽天からのエラー: ${errData.error_description || errData.error || response.statusText}`);
                    });
                }
                return response.json();
            })
            .then(data => {
                if (!data.Items || data.Items.length === 0) {
                    statusDiv.innerText = '通信成功：本が見つかりませんでした。';
                    return;
                }

                statusDiv.innerText = `成功！ ${data.Items.length}件見つかりました！`;

                data.Items.forEach(item => {
                    const book = item.Item;
                    const bookEl = document.createElement('div');
                    bookEl.style.margin = '20px 0';
                    bookEl.innerHTML = `
                        <h3>${book.title}</h3>
                        <p>著者: ${book.author} / 出版社: ${book.publisher}</p>
                        <p>発売日: ${book.salesDate}</p>
                        <img src="${book.mediumImageUrl}" alt="表紙">
                        <hr>
                    `;
                    resultsDiv.appendChild(bookEl);
                });
            })
            .catch(error => {
                console.error('エラー詳細:', error);
                statusDiv.innerHTML = `<span style="color:red; font-weight:bold;">❌ 停止: ${error.message}</span>`;
            });
        });
    </script>
</body>
</html>
