<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>完全開通版 - ヲタクの本気管理アプリ</title>
</head>
<body>
    <h1>書籍検索テスト</h1>
    <input type="text" id="keyword" placeholder="鬼滅の刃、など">
    <button id="search-btn">検索する</button>

    <div id="status" style="margin: 10px 0; padding: 10px; background: #eee; border-left: 5px solid #333;">
        ここに通信状態が表示されます。
    </div>

    <div id="results"></div>

    <script>
        document.getElementById('search-btn').addEventListener('click', () => {
            const keyword = document.getElementById('keyword').value;
            const statusDiv = document.getElementById('status');
            const resultsDiv = document.getElementById('results');
            
            if (!keyword) return alert('キーワードを入力してください');

            statusDiv.innerText = 'CORS回避サーバーを経由して、楽天からデータを取得中...';
            resultsDiv.innerHTML = '';

            // あなたの正しいIDとアクセスキー
            const appId = 'cc9bd69b-720f-46a4-8820-b3e27c9b26c7'; 
            const accessKey = 'MvWraoxmEPfz7byKhIa8lvvYgzkwwRLJq'; 

            // 本物の楽天APIのURL
            const rakutenUrl = `https://app.rakuten.co.jp/services/api/BooksBook/Search/20170404?format=json&keyword=${encodeURIComponent(keyword)}`;

            // 【CORSエラーを100%回避する魔法のURL】
            // 楽天がブラウザからの直接アクセスを拒否するため、この無料の中継サーバーを通します。
            const proxyUrl = 'https://cors-anywhere.herokuapp.com/';
            const url = proxyUrl + rakutenUrl;

            fetch(url, {
                method: 'GET',
                headers: {
                    'X-Rakuten-Application-Id': appId,
                    'X-Rakuten-Access-Key': accessKey
                }
            })
            .then(response => {
                if (!response.ok) {
                    return response.json().then(errData => {
                        throw new Error(`エラー: ${errData.error_description || errData.error || response.statusText}`);
                    });
                }
                return response.json();
            })
            .then(data => {
                if (!data.Items || data.Items.length === 0) {
                    statusDiv.innerText = '通信成功：本が見つかりませんでした。';
                    return;
                }

                statusDiv.innerText = `成功！ ${data.Items.length}件の本が見つかりました！`;

                data.Items.forEach(item => {
                    const book = item.Item;
                    const bookEl = document.createElement('div');
                    bookEl.style.margin = '20px 0';
                    bookEl.innerHTML = `
                        <h3>${book.title}</h3>
                        <p>著者: ${book.author} / 出版社: ${book.publisher}</p>
                        <p>発売日: ${book.salesDate}</p>
                        <img src="${book.mediumImageUrl}" alt="表紙">
                        <hr>
                    `;
                    resultsDiv.appendChild(bookEl);
                });
            })
            .catch(error => {
                console.error('エラー詳細:', error);
                
                // 初回だけ中継サーバーの利用許可ボタンを押す必要がある場合の親切な案内
                statusDiv.innerHTML = `
                    <span style="color:red; font-weight:bold;">❌ 停止: ${error.message}</span><br><br>
                    <p>※もしエラーが出た場合は、一度だけ下のボタンを押して、開いた先のページで<b>【Request temporary access to demo server】</b>という自由化ボタンを押してから、もう一度この画面で検索してください。</p>
                    <a href="https://cors-anywhere.herokuapp.com/corsdemo" target="_blank" style="display:inline-block; padding:10px; background:#333; color:#fff; text-decoration:none; font-weight:bold; border-radius:5px;">ここを押してアクセスを許可する（初回のみ）</a>
                `;
            });
        });
    </script>
</body>
</html>
