<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>完全開通版 - ヲタクの本気管理アプリ</title>
</head>
<body>
    <h1>書籍検索テスト</h1>
    <input type="text" id="keyword" placeholder="鬼滅の刃、など">
    <button id="search-btn">検索する</button>

    <div id="status" style="margin: 10px 0; padding: 10px; background: #eee; border-left: 5px solid #333;">
        ここに通信状態が表示されます。
    </div>

    <div id="results"></div>

    <script>
        document.getElementById('search-btn').addEventListener('click', () => {
            const keyword = document.getElementById('keyword').value;
            const statusDiv = document.getElementById('status');
            const resultsDiv = document.getElementById('results');
            
            if (!keyword) return alert('キーワードを入力してください');

            statusDiv.innerText = '楽天のデータを読み込み中...';
            resultsDiv.innerHTML = '';

            // あなたの正しいIDとアクセスキー（上の段の有効期限：2027年6月29日のもの）
            const appId = 'cc9bd69b-720f-46a4-8820-b3e27c9b26c7'; 
            const accessKey = 'MvWraoxmEPfz7byKhIa8lvvYgzkwwRLJq'; 

            // 【超重要】
            // 中継サーバーに消されないよう、URLの末尾に直接 
            // &applicationId= と &accessKey= を合体させて送る形に修正しました！
            const rakutenUrl = `https://app.rakuten.co.jp/services/api/BooksBook/Search/20170404?format=json&keyword=${encodeURIComponent(keyword)}&applicationId=${appId}&accessKey=${accessKey}`;

            // CORS回避プロキシ
            const proxyUrl = 'https://cors-anywhere.herokuapp.com/';
            const url = proxyUrl + rakutenUrl;

            // headers（裏設定）を完全に無くし、シンプルな通信に変えました
            fetch(url)
            .then(response => {
                if (!response.ok) {
                    return response.json().then(errData => {
                        throw new Error(`エラー: ${errData.error_description || errData.error || response.statusText}`);
                    });
                }
                return response.json();
            })
            .then(data => {
                if (!data.Items || data.Items.length === 0) {
                    statusDiv.innerText = '通信成功：本が見つかりませんでした。';
                    return;
                }

                statusDiv.innerText = `成功！ ${data.Items.length}件の本が見つかりました！`;

                data.Items.forEach(item => {
                    const book = item.Item;
                    const bookEl = document.createElement('div');
                    bookEl.style.margin = '20px 0';
                    bookEl.innerHTML = `
                        <h3>${book.title}</h3>
                        <p>著者: ${book.author} / 出版社: ${book.publisher}</p>
                        <p>発売日: ${book.salesDate}</p>
                        <img src="${book.mediumImageUrl}" alt="表紙">
                        <hr>
                    `;
                    resultsDiv.appendChild(bookEl);
                });
            })
            .catch(error => {
                console.error('エラー詳細:', error);
                statusDiv.innerHTML = `<span style="color:red; font-weight:bold;">❌ 停止: ${error.message}</span>`;
            });
        });
    </script>
</body>
</html>
