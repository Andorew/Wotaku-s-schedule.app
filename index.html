<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>2026年最新仕様対応 - ヲタクの本気管理アプリ</title>
</head>
<body>
    <h1>書籍検索テスト</h1>
    <input type="text" id="keyword" placeholder="鬼滅の刃、など">
    <button id="search-btn">検索する</button>

    <div id="status" style="margin: 10px 0; padding: 10px; background: #eee; border-left: 5px solid #333;">
        ここに通信状態が表示されます。
    </div>

    <div id="results"></div>

    <script>
        document.getElementById('search-btn').addEventListener('click', () => {
            const keyword = document.getElementById('keyword').value;
            const statusDiv = document.getElementById('status');
            const resultsDiv = document.getElementById('results');
            
            if (!keyword) return alert('キーワードを入力してください');

            statusDiv.innerText = '最新の楽天認証システムへ安全に接続中...';
            resultsDiv.innerHTML = '';

            // あなたの持っている最新のIDとアクセスキー（上の段：2027年6月29日有効のもの）
            const appId = 'cc9bd69b-720f-46a4-8820-b3e27c9b26c7'; 
            const accessKey = 'MvWraoxmEPfz7byKhIa8lvvYgzkwwRLJq'; 

            // 【最新のURL仕様】
            // URL末尾には一切IDやキーを載せません。純粋な検索クエリのみにします。
            const url = `https://app.rakuten.co.jp/services/api/BooksBook/Search/20170404?format=json&keyword=${encodeURIComponent(keyword)}`;

            // 【最新の認証ヘッダー仕様】
            // noteの指摘通り、ブラウザ標準の fetch を使い、
            // 正しいリクエストヘッダー（キー名）でIDとアクセスキーを送信することで、
            // 楽天側が「正当なブラウザからのアクセス（Origin：github.io）」であると認め、認証をパスさせます。
            fetch(url, {
                method: 'GET',
                mode: 'cors', // CORS通信であることを明示
                headers: {
                    'Authorization': `Bearer ${accessKey}`, // 2026年最新のトークン認証形式
                    'X-Rakuten-Application-Id': appId
                }
            })
            .then(response => {
                if (!response.ok) {
                    return response.json().then(errData => {
                        throw new Error(`楽天からのエラー: ${errData.error_description || errData.error || response.statusText}`);
                    });
                }
                return response.json();
            })
            .then(data => {
                if (!data.Items || data.Items.length === 0) {
                    statusDiv.innerText = '通信成功：本が見つかりませんでした。';
                    return;
                }

                statusDiv.innerText = `成功！ ${data.Items.length}件の本が見つかりました！`;

                data.Items.forEach(item => {
                    const book = item.Item;
                    const bookEl = document.createElement('div');
                    bookEl.style.margin = '20px 0';
                    bookEl.innerHTML = `
                        <h3>${book.title}</h3>
                        <p>著者: ${book.author} / 出版社: ${book.publisher}</p>
                        <p>発売日: ${book.salesDate}</p>
                        <img src="${book.mediumImageUrl}" alt="表紙">
                        <hr>
                    `;
                    resultsDiv.appendChild(bookEl);
                });
            })
            .catch(error => {
                console.error('エラー詳細:', error);
                
                // もし認証の形式（Authorizationキー）が違った場合の、もう一つの最新ヘッダーパターンでの案内
                statusDiv.innerHTML = `
                    <span style="color:red; font-weight:bold;">❌ エラー: ${error.message}</span><br><br>
                    <small style="color:#666;">※もしこのエラーが「401 Unauthorized」などの認証エラーである場合、楽天へ送るヘッダーの名前を微修正する必要があります。その際はこの画面の文字を教えてください！</small>
                `;
            });
        });
    </script>
</body>
</html>
