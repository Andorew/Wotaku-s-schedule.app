<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>書籍検索システム - 完全開通版</title>
  </head>
  <body>
    <h1>書籍検索テスト (Google Books 確定版)</h1>
    <input type="text" id="keyword" placeholder="鬼滅の刃、ONE PIECEなど" />
    <button id="search-btn">検索する</button>

    <div
      id="status"
      style="
        margin: 10px 0;
        padding: 10px;
        background: #eee;
        border-left: 5px solid #007acc;
      "
    >
      ここに通信状態が表示されます。
    </div>

    <div id="results"></div>

    <script>
     document.getElementById('search-btn').addEventListener('click', () => {
            const keyword = document.getElementById('keyword').value;
            const statusDiv = document.getElementById('status');
            const resultsDiv = document.getElementById('results');
            
            if (!keyword) return alert('キーワードを入力してください');

            statusDiv.innerText = 'Google Books API から単行本を大量に取得中...';
            resultsDiv.innerHTML = '';

            // 【重要】ご自身のAPIキーを入れてください
            const apiKey = 'あなたのAPIキー'; 

            // 💡 対策：日本の漫画を探しやすくするため、裏で「コミック」というワードを自動で足します
            const searchWord = `${keyword} コミック`;

            // 💡 対策：
            // &maxResults=40 で上限を10件から40件にアップ！
            // &printType=books で雑誌を完全に排除して本（単行本など）だけに絞り込み！
            const url = `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(searchWord)}&maxResults=40&printType=books&key=${apiKey}`;

            fetch(url)
            .then(response => {
                if (!response.ok) {
                    return response.json().then(errData => {
                        throw new Error(`Googleエラー: ${errData.error.message || response.statusText}`);
                    });
                }
                return response.json();
            })
            .then(data => {
                if (!data.items || data.items.length === 0) {
                    statusDiv.innerText = '通信成功：本が見つかりませんでした。';
                    return;
                }

                statusDiv.innerText = `成功！ ${data.items.length}件の本が見つかりました！`;

                data.items.forEach(item => {
                    const volumeInfo = item.volumeInfo;
                    
                    let bookImage = 'https://via.placeholder.com/128x180?text=No+Image';
                    if (volumeInfo.imageLinks && volumeInfo.imageLinks.thumbnail) {
                        bookImage = volumeInfo.imageLinks.thumbnail.replace('http://', 'https://');
                    }
                    
                    const authors = volumeInfo.authors ? volumeInfo.authors.join(', ') : '不明';
                    const publisher = volumeInfo.publisher || '不明';

                    const bookEl = document.createElement('div');
                    bookEl.style.margin = '20px 0';
                    bookEl.innerHTML = `
                        <h3>${volumeInfo.title}</h3>
                        <p>著者: ${authors} / 出版社: ${publisher}</p>
                        <p>発売日: ${volumeInfo.publishedDate || '不明'}</p>
                        <img src="${bookImage}" alt="表紙" style="box-shadow: 2px 2px 5px rgba(0,0,0,0.2); max-width: 130px;">
                        <hr style="border: 0; border-top: 1px solid #ccc; margin-top: 15px;">
                    `;
                    resultsDiv.appendChild(bookEl);
                });
            })
            .catch(error => {
                console.error('エラー詳細:', error);
                statusDiv.innerHTML = `<span style="color:red; font-weight:bold;">❌ エラー: ${error.message}</span>`;
            });
        });
    </script>
  </body>
</html>
