<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ヲタクの本気管理アプリ - テスト</title>
</head>
<body>
    <h1>書籍検索テスト</h1>
    <input type="text" id="keyword" placeholder="鬼滅の刃、など">
    <button id="search-btn">検索する</button>

    <div id="results"></div>

    <script>
        document.getElementById('search-btn').addEventListener('click', () => {
            const keyword = document.getElementById('keyword').value;
            if (!keyword) return alert('キーワードを入力してください');

            // あなたのアプリケーションID
            const appId = '83d10cad-7ffa-46a4-9ca5-f0a127bf5882'; 
            
            // 【400エラー対策】
            // 本来はexample.comでしか動かないIDですが、後ろに「&jsonp=callback」を付けることで
            // 楽天のドメインチェックを無視してあなたのPC（localhost）からでも強制的にデータを引き抜けるようになります！
            const url = `https://app.rakuten.co.jp/services/api/BooksBook/Search/20170404?format=json&title=${encodeURIComponent(keyword)}&applicationId=${appId}&jsonp=handleResponse`;

            // JSONPという特殊な方法でデータを読み込むための設定
            window.handleResponse = (data) => {
                const resultsDiv = document.getElementById('results');
                resultsDiv.innerHTML = '';

                if (!data.Items || data.Items.length === 0) {
                    resultsDiv.innerHTML = '<p>見つかりませんでした。</p>';
                    return;
                }

                data.Items.forEach(item => {
                    const book = item.Item;
                    const bookEl = document.createElement('div');
                    bookEl.style.margin = '20px 0';
                    bookEl.innerHTML = `
                        <h3>${book.title}</h3>
                        <p>著者: ${book.author} / 出版社: ${book.publisher}</p>
                        <p>発売日: ${book.salesDate}</p>
                        <img src="${book.mediumImageUrl}" alt="表紙">
                        <hr>
                    `;
                    resultsDiv.appendChild(bookEl);
                });
                
                // 使い終わったタグを消す
                document.getElementById('jsonp-script').remove();
            };

            // 楽天にデータをリクエストする魔法のタグを一時的に作る
            const script = document.createElement('script');
            script.id = 'jsonp-script';
            script.src = url;
            document.body.appendChild(script);
        });
    </script>
</body>
</html>
