<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>書籍検索システム - 完全開通版</title>
  </head>
  <body>
    <h1>書籍検索テスト (Google Books 確定版)</h1>
    <input type="text" id="keyword" placeholder="鬼滅の刃、ONE PIECEなど" />
    <button id="search-btn">検索する</button>

    <div
      id="status"
      style="
        margin: 10px 0;
        padding: 10px;
        background: #eee;
        border-left: 5px solid #007acc;
      "
    >
      ここに通信状態が表示されます。
    </div>

    <div id="results"></div>

    <script>
      document.getElementById('search-btn').addEventListener('click', () => {
            const keyword = document.getElementById('keyword').value;
            const statusDiv = document.getElementById('status');
            const resultsDiv = document.getElementById('results');
            
            if (!keyword) return alert('キーワードを入力してください');

            statusDiv.innerText = '日本の単行本だけを厳選中（海外翻訳版をブロック）...';
            resultsDiv.innerHTML = '';

            // 【重要】ご自身のAPIキーを入れてください
            const apiKey = 'AIzaSyAs_2Ny296ofJ5GHFfjuApgHtgo7fV0wYw'; 

            // タイトルにキーワードが含まれ、フィクション（物語・マンガ）であるもの
            const advancedQuery = `intitle:${keyword} subject:Fiction`;

            // 💡 &startIndex=0 を追加して、Google側が勝手に件数をケチるバグを抑制
            const url = `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(advancedQuery)}&langRestrict=ja&maxResults=40&startIndex=0&orderBy=relevance&key=${apiKey}`;

            fetch(url)
            .then(response => {
                if (!response.ok) {
                    return response.json().then(errData => {
                        throw new Error(`Googleエラー: ${errData.error.message || response.statusText}`);
                    });
                }
                return response.json();
            })
            .then(data => {
                if (!data.items || data.items.length === 0) {
                    statusDiv.innerText = '通信成功：日本の単行本が見つかりませんでした。';
                    return;
                }

                let displayCount = 0;

                data.items.forEach(item => {
                    const volumeInfo = item.volumeInfo;
                    const saleInfo = item.saleInfo || {};
                    const title = volumeInfo.title || "";
                    
                    // 💡 【超強力フィルター1：雑誌やまとめ本の除外】
                    if (title.includes("雑誌") || title.includes("マガジン") || title.includes("ジャンプ") || title.includes("合本")) {
                        return; 
                    }

                    // 💡 【超強力フィルター2：出版国チェック】
                    // 出版された国が「JP（日本）」ではない、または価格の通貨が「JPY（日本円）」ではない場合、
                    // 言語が「ja」になっていても海外の翻訳版なので強制排除します！
                    const country = saleInfo.country || "";
                    const currency = (saleInfo.retailPrice && saleInfo.retailPrice.currencyCode) || "";
                    
                    // 最低限、国がJPであるか、またはタイトルに日本語（ひらがな・カタカナ・漢字）が1文字でも含まれるかチェック
                    const hasJapanese = /[\u3040-\u309F\u30A0-\u30FF\u4E00-\u9FAF]/.test(title);
                    if (!hasJapanese && country !== "JP") {
                        return; // 完全にアルファベットだけの洋書をスキップ
                    }

                    // 💡 【画像エラー対策】
                    // 切断された placeholder サイトを使わず、別の超安定しているデザイン画像に変更しました
                    let bookImage = 'https://images.unsplash.com/photo-1543002588-bfa74002ed7e?w=130&q=80'; 
                    if (volumeInfo.imageLinks && volumeInfo.imageLinks.thumbnail) {
                        bookImage = volumeInfo.imageLinks.thumbnail.replace('http://', 'https://');
                    }
                    
                    const authors = volumeInfo.authors ? volumeInfo.authors.join(', ') : '不明';
                    const publisher = volumeInfo.publisher || '不明';

                    displayCount++;

                    const bookEl = document.createElement('div');
                    bookEl.style.margin = '20px 0';
                    bookEl.innerHTML = `
                        <h3>${title}</h3>
                        <p>著者: ${authors} / 出版社: ${publisher}</p>
                        <p>発売日: ${volumeInfo.publishedDate || '不明'}</p>
                        <img src="${bookImage}" alt="表紙" style="box-shadow: 2px 2px 5px rgba(0,0,0,0.2); max-width: 130px;">
                        <hr style="border: 0; border-top: 1px solid #ccc; margin-top: 15px;">
                    `;
                    resultsDiv.appendChild(bookEl);
                });

                statusDiv.innerText = `成功！ノイズを除去し、日本のコミックス等 ${displayCount} 件を表示しました！`;
            })
            .catch(error => {
                console.error('エラー詳細:', error);
                statusDiv.innerHTML = `<span style="color:red; font-weight:bold;">❌ エラー: ${error.message}</span>`;
            });
        });
    </script>
  </body>
</html>
