<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>💡 原因調査版 - ヲタクの本気管理アプリ</title>
  </head>
  <body>
    <h1>書籍検索テスト（原因調査モード）</h1>
    <input type="text" id="keyword" placeholder="鬼滅の刃、など" />
    <button id="search-btn">検索する</button>

    <div
      id="status"
      style="
        margin: 10px 0;
        padding: 10px;
        background: #eee;
        border-left: 5px solid #333;
      "
    >
      ここに通信状態が表示されます。
    </div>

    <div id="results"></div>

    <script>
      document.getElementById("search-btn").addEventListener("click", () => {
        const keyword = document.getElementById("keyword").value;
        const statusDiv = document.getElementById("status");
        const resultsDiv = document.getElementById("results");

        if (!keyword) return alert("キーワードを入力してください");

        statusDiv.innerText = "楽天APIにリクエストを送信中...";
        resultsDiv.innerHTML = "";

        // あなたのアプリケーションID
        const appId = "83d10cad-7ffa-46a4-9ca5-f0a127bf5882";

        // 確実性を高めるため、一度通常の取得方法（Fetch）に戻し、
        // かつ文字化けを防ぐ処理を完全に固定します
        const url = `https://app.rakuten.co.jp/services/api/BooksBook/Search/20170404?format=json&title=${encodeURIComponent(keyword)}&applicationId=${appId}`;

        fetch(url)
          .then((response) => {
            // 楽天からの返事のステータスコード（200なら成功、400や401ならエラー）をチェック
            statusDiv.innerText = `楽天から返事を受信（ステータスコード: ${response.status}）`;

            if (!response.ok) {
              throw new Error(
                `エラーが発生しました（コード: ${response.status}）\n※example.comで登録したドメイン制限に引っかかっている可能性が非常に高いです。`,
              );
            }
            return response.json();
          })
          .then((data) => {
            if (!data.Items || data.Items.length === 0) {
              statusDiv.innerText =
                "通信成功：ただし、入力されたキーワードに一致する本が見つかりませんでした。";
              return;
            }

            statusDiv.innerText = `成功！ ${data.Items.length}件の本が見つかりました！`;

            data.Items.forEach((item) => {
              const book = item.Item;
              const bookEl = document.createElement("div");
              bookEl.style.margin = "20px 0";
              bookEl.innerHTML = `
                            <h3>${book.title}</h3>
                            <p>著者: ${book.author} / 出版社: ${book.publisher}</p>
                            <p>発売日: ${book.salesDate}</p>
                            <img src="${book.mediumImageUrl}" alt="表紙">
                            <hr>
                        `;
              resultsDiv.appendChild(bookEl);
            });
          })
          .catch((error) => {
            console.error("エラー詳細:", error);
            statusDiv.innerHTML = `<span style="color:red; font-weight:bold;">❌ 停止しました: ${error.message}</span>`;
          });
      });
    </script>
  </body>
</html>
