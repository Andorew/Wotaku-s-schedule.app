<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>原因特定版 - ヲタクの本気管理アプリ</title>
</head>
<body>
    <h1>書籍検索テスト（最終原因調査）</h1>
    <input type="text" id="keyword" placeholder="鬼滅の刃、など">
    <button id="search-btn">検索する</button>

    <div id="status" style="margin: 10px 0; padding: 10px; background: #eee; border-left: 5px solid #333;">
        ここに通信状態が表示されます。
    </div>

    <div id="results"></div>

    <script>
        // 楽天からデータが返ってきたときに実行される関数
        window.rakutenCallback = (data) => {
            const statusDiv = document.getElementById('status');
            
            // 【修正ポイント】楽天が返すあらゆるエラーのパターンを網羅して画面に出します
            if (data.error || data.status === 'NOT_FOUND' || data.error_description) {
                const errorMsg = data.error_description || data.error || '不明なエラー';
                const errorReason = data.message || '';
                
                statusDiv.innerHTML = `
                    <span style="color:red; font-weight:bold;">❌ 楽天が通信を拒否した本当の理由：</span><br>
                    <strong>エラー名:</strong> ${errorMsg}<br>
                    <strong>詳しい理由:</strong> ${errorReason}<br><br>
                    <small style="color:#666;">※これをもとに一発で修正できます！</small>
                `;
                return;
            }

            if (!data.Items || data.Items.length === 0) {
                statusDiv.innerText = '通信成功：本が見つかりませんでした。';
                return;
            }

            statusDiv.innerText = `成功！ ${data.Items.length}件の本が見つかりました！`;

            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';
            data.Items.forEach(item => {
                const book = item.Item;
                const bookEl = document.createElement('div');
                bookEl.style.margin = '20px 0';
                bookEl.innerHTML = `
                    <h3>${book.title}</h3>
                    <p>著者: ${book.author} / 出版社: ${book.publisher}</p>
                    <p>発売日: ${book.salesDate}</p>
                    <img src="${book.mediumImageUrl}" alt="表紙">
                    <hr>
                `;
                resultsDiv.appendChild(bookEl);
            });

            const oldScript = document.getElementById('rakuten-jsonp');
            if (oldScript) oldScript.remove();
        };

        document.getElementById('search-btn').addEventListener('click', () => {
            const keyword = document.getElementById('keyword').value;
            const statusDiv = document.getElementById('status');
            const resultsDiv = document.getElementById('results');
            
            if (!keyword) return alert('キーワードを入力してください');

            statusDiv.innerText = '楽天のサーバーに直接問い合せ中...';
            resultsDiv.innerHTML = '';

            const appId = '83d10cad-7ffa-46a4-9ca5-f0a127bf5882'; 
            const url = `https://app.rakuten.co.jp/services/api/BooksBook/Search/20170404?format=json&keyword=${encodeURIComponent(keyword)}&applicationId=${appId}&callback=rakutenCallback`;

            const oldScript = document.getElementById('rakuten-jsonp');
            if (oldScript) oldScript.remove();

            const script = document.createElement('script');
            script.id = 'rakuten-jsonp';
            script.src = url;
            document.body.appendChild(script);
        });
    </script>
</body>
</html>
